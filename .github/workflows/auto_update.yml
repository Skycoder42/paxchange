name: Automatic dependency updates

on:
  workflow_dispatch:
  schedule:
    - cron: "21 12 * * 3"

jobs:
  ci:
    name: Updates
    uses: Skycoder42/dart_test_tools/.github/workflows/auto-update.yml@main
    permissions:
      contents: write
      pull-requests: write
      actions: write
    with:
      validationWorkflow: ci.yml
